services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trainable
      POSTGRES_PASSWORD: trainable
      POSTGRES_DB: trainable
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainable"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trainable:trainable@postgres:5432/trainable
      S3_ENDPOINT: http://minio:9000
      S3_ENDPOINT_EXTERNAL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app
      - ~/.modal.toml:/home/trainable/.modal.toml:ro
      - ~/.claude:/home/trainable/.claude:ro
      # OAuth state for OpenAI Codex CLI / Gemini CLI (local dev only — never
      # in docker-compose.prod.yml). The presence of these directories triggers
      # the OAuth-CLI auth path; missing on prod, providers fall back to API keys.
      - ~/.codex:/home/trainable/.codex:ro
      - ~/.gemini:/home/trainable/.gemini:ro
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: builder
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
    command: ["npm", "run", "dev"]
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
