services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trainable
      POSTGRES_PASSWORD: trainable
      POSTGRES_DB: trainable
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainable"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Jaeger v2 — OTLP is the native ingestion path (no extra env var needed).
  # UI at http://localhost:16686. Backend ships traces via OTLP/gRPC on 4317.
  jaeger:
    image: jaegertracing/jaeger:2.17.0
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC (what the backend uses)
      - "4318:4318"    # OTLP HTTP (alternative)

  backend:
    build: ./backend
    ports:
      # Host port is overridable via $BACKEND_PORT (e.g. when 8000 is taken
      # by another local process). Container side stays 8000 so the
      # frontend's BACKEND_URL=http://backend:8000 keeps working.
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://trainable:trainable@postgres:5432/trainable
      S3_ENDPOINT: http://minio:9000
      S3_ENDPOINT_EXTERNAL: http://localhost:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      WATCHFILES_FORCE_POLLING: "true"
      # OTel — point at the Jaeger sidecar by default in dev so traces
      # land without extra configuration. Override via .env if you want
      # to ship to a different collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_SERVICE_NAME: trainable-backend
    volumes:
      - ./backend:/app
      - ~/.modal.toml:/home/trainable/.modal.toml:ro
      - ~/.claude:/home/trainable/.claude:ro
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      jaeger:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: builder
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
    command: ["npm", "run", "dev"]
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
