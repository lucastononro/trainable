name: Publish CLI to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # `uv build` ships its own PEP-517 builder — no need to install the
      # `build` package separately, and it's an order of magnitude faster.
      - name: Build package
        working-directory: cli
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cli/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
