type: object
properties:
  code:
    type: string
    description: Python code to execute in the sandbox
  heavy:
    type: boolean
    description: 'Set to true for heavy ML workloads (training, tuning, large transforms).
      Uses the project''s training sandbox profile with GPU and extended timeout.
      Leave false for lightweight tasks (EDA, plotting, data inspection).

      '
    default: false
required:
- code
