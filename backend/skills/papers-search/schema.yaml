type: object
properties:
  operation:
    type: string
    enum:
      - search
      - paper_details
      - read_paper
      - download_pdf
      - citation_graph
      - snippet_search
      - recommend
      - find_datasets
      - find_models
      - find_collections
      - find_all_resources
    description: Operation to execute.
  query:
    type: string
    description: >
      Search query. Required for: search, snippet_search.
      Optional for: trending (filters keyword).
      Semantic Scholar supports boolean: "exact phrase" term1 | term2.
  arxiv_id:
    type: string
    description: >
      ArXiv paper ID, e.g. '2305.18290'. Required for: paper_details,
      read_paper, download_pdf, citation_graph, find_datasets,
      find_models, find_collections, find_all_resources. Optional
      for: recommend.
  section:
    type: string
    description: >
      Section name or number, e.g. '3', '4.2', 'Experiments'. Optional
      for read_paper. Without it, returns abstract + table of contents.
  direction:
    type: string
    enum: [citations, references, both]
    description: Direction for citation_graph. Default "both".
  date:
    type: string
    description: YYYY-MM-DD. Optional for trending.
  date_from:
    type: string
    description: YYYY-MM-DD start date. Triggers Semantic Scholar search.
  date_to:
    type: string
    description: YYYY-MM-DD end date. Triggers Semantic Scholar search.
  categories:
    type: string
    description: >
      Field of study filter (e.g. 'Computer Science'). Triggers
      Semantic Scholar search.
  min_citations:
    type: integer
    description: Minimum citation count. Triggers Semantic Scholar search.
  sort_by:
    type: string
    enum: [relevance, citationCount, publicationDate, submittedDate, lastUpdatedDate]
    description: >
      Sort order. relevance|citationCount|publicationDate route to
      Semantic Scholar; submittedDate|lastUpdatedDate route to arXiv.
      Default "relevance".
  positive_ids:
    type: string
    description: >
      Comma-separated arxiv IDs as positive examples for `recommend`.
  negative_ids:
    type: string
    description: >
      Comma-separated arxiv IDs as negative examples for `recommend`.
  sort:
    type: string
    enum: [downloads, likes, trending]
    description: Sort order for find_datasets and find_models. Default "downloads".
  limit:
    type: integer
    description: Maximum results to return (default 10, max 50).
required:
  - operation
