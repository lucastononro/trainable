type: object
properties:
  agent_id:
    type: string
    description: The agent_id whose context to inspect (e.g. "root" or "a3f8b2c1")
  mode:
    type: string
    enum:
    - blocks
    - chars
    - turns
    description: 'How to slice. "blocks" (default): each unit is one thought block
      —

      never cuts mid-payload. "chars": offset/limit on the linearized string.

      "turns": each unit is a contiguous run of assistant blocks between user/tool_result
      rows.

      '
  offset:
    type: integer
    description: Starting index (in units of `mode`). Default 0.
  limit:
    type: integer
    description: Max units to return. Default 20.
  head:
    type: integer
    description: Shortcut — return the first N units. Overrides offset/limit.
  tail:
    type: integer
    description: Shortcut — return the last N units. Overrides offset/limit.
  filter_block_types:
    type: array
    items:
      type: string
      enum:
      - text
      - tool_use
      - tool_result
    description: Only include blocks of these types.
  filter_tool_names:
    type: array
    items:
      type: string
    description: Only include tool_use/tool_result blocks for these tool names.
required:
- agent_id
