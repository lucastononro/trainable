name: read_session_file
description: |
  Read a single file from another session's workspace (same project only).
  Text files (.md, .py, .json, .csv, .txt, etc.) come back as UTF-8 text
  with offset/limit pagination. Binary files (images, parquet, pickles)
  come back base64-encoded and capped at ~200KB.

  Use after `list_session_files` to pull a specific report, script, or
  figure from a sibling chat without re-running the work.

  Safeguards: only sessions in the current project; path traversal blocked.

input_schema:
  type: object
  properties:
    session_id:
      type: string
      description: The session_id whose workspace you want to read from.
    path:
      type: string
      description: |
        File path. Either absolute (/sessions/{sid}/...) or relative to that
        session's workspace ("report.md", "figures/loss.png"). Must stay
        inside the target session's workspace.
    offset:
      type: integer
      description: Starting character offset for text files (default 0).
    limit:
      type: integer
      description: Max characters to return for text files (default 12000, max 12000).
  required:
    - session_id
    - path
