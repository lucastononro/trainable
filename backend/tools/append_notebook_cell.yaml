name: append_notebook_cell
description: |
  Append a cell to a named notebook under
  `/data/sessions/{session_id}/notebooks/{notebook_name}.ipynb`.
  Creates the notebook if it doesn't exist yet.

  Use this to drop cells into the user's interactive notebook WITHOUT
  executing — great for markdown narrative, TODO cells, or code you want
  the user to review before running. Use `run_notebook_cell` when you want
  the cell to execute immediately.

  Multiple notebooks per session are supported — organise by analysis
  theme (e.g. "data-overview", "target-distribution", "baseline-model").
  Notebook names are slugged automatically (alphanumerics + `-_` only).

input_schema:
  type: object
  properties:
    notebook_name:
      type: string
      description: |
        Target notebook (e.g. "data-overview"). Creates the file if it
        doesn't exist. Defaults to "scratch" if omitted.
    cell_type:
      type: string
      enum: ["code", "markdown"]
      description: "'code' for a runnable Python cell; 'markdown' for narrative/headings."
    source:
      type: string
      description: |
        The full cell source. For code cells this is Python; for markdown it
        is standard markdown. Markdown cells can reference session-local
        images with `![alt](figures/chart.png)` — the UI will rewrite
        relative paths to the session workspace.
    after_cell_id:
      type: string
      description: |
        Optional — insert directly after this existing cell. Otherwise
        the cell is appended at the end.
  required:
    - cell_type
    - source
