name: inspect_agent_context
description: |
  Read another agent's full thought stream from the current session. Returns
  the agent's text output, tool calls, and tool results in chronological order
  as a single string with timestamps. Slice it like a list — pick a `mode` and
  pass `offset` + `limit`, or use `head` / `tail` for the first/last N blocks.

  Each block in the returned content carries its `created_at` timestamp so you
  can compare against your own runtime "Current time" to tell what is recent
  vs. stale. Default is `tail=20` — the last 20 thought blocks of the agent.

  Use `list_session_agents` first to discover which agent_ids exist in this
  session.

input_schema:
  type: object
  properties:
    agent_id:
      type: string
      description: The agent_id whose context to inspect (e.g. "root" or "a3f8b2c1")
    mode:
      type: string
      enum: ["blocks", "chars", "turns"]
      description: |
        How to slice. "blocks" (default): each unit is one thought block —
        never cuts mid-payload. "chars": offset/limit on the linearized string.
        "turns": each unit is a contiguous run of assistant blocks between user/tool_result rows.
    offset:
      type: integer
      description: Starting index (in units of `mode`). Default 0.
    limit:
      type: integer
      description: Max units to return. Default 20.
    head:
      type: integer
      description: Shortcut — return the first N units. Overrides offset/limit.
    tail:
      type: integer
      description: Shortcut — return the last N units. Overrides offset/limit.
    filter_block_types:
      type: array
      items:
        type: string
        enum: ["text", "tool_use", "tool_result"]
      description: Only include blocks of these types.
    filter_tool_names:
      type: array
      items:
        type: string
      description: Only include tool_use/tool_result blocks for these tool names.
  required:
    - agent_id
