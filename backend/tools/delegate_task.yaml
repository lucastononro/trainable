name: delegate_task
description: |
  Delegate a task to a specialized sub-agent. The sub-agent runs to
  completion and returns its output text. Use this to break complex
  workflows into steps handled by specialist agents.

input_schema:
  type: object
  properties:
    agent_type:
      type: string
      description: The type of specialist agent to invoke
    task:
      type: string
      description: Specific instructions for the sub-agent
    context:
      type: string
      description: Optional context from prior agent results to pass along
  required:
    - agent_type
    - task
