# Trainable cost catalog — single source of truth for token + compute pricing.
#
# Edit this file when a provider changes rates. No code change required;
# the backend reads it at startup (and on first request after a save in
# dev, since the loader uses lru_cache and reload_pricing() clears it).
# Prod restarts re-read.
#
# Last reviewed: 2026-05

# ---------------------------------------------------------------------------
# LLM token pricing — USD per MILLION tokens.
#
# Lookup is flexible:
#   - exact match wins                    ("claude-opus-4-7")
#   - vendor prefix is stripped           ("anthropic:claude-opus-4-7" → ...)
#   - longest-prefix fallback             ("claude-haiku-4-5-20251001" → "claude-haiku-4-5")
#
# Per-model cache_read / cache_creation keys are USD per million tokens.
# When absent, the global cache.read_multiplier / cache.creation_multiplier
# (Anthropic ephemeral defaults) apply to the model's input rate.
# ---------------------------------------------------------------------------
llm:
  # ---- Anthropic — Claude ------------------------------------------------
  # Cache read: 0.10× input · cache write 5min: 1.25× input · 1h: 2.0× input.
  # We bill the 5min variant by default (the SDK doesn't distinguish in usage).
  claude-opus-4-7:
    input: 15.00
    output: 75.00
    cache_read: 1.50          # 0.10× input
    cache_creation: 18.75     # 1.25× input
  claude-opus-4-6:
    input: 15.00
    output: 75.00
    cache_read: 1.50
    cache_creation: 18.75
  claude-sonnet-4-6:
    input: 3.00
    output: 15.00
    cache_read: 0.30
    cache_creation: 3.75
  claude-haiku-4-5:
    input: 0.80
    output: 4.00
    cache_read: 0.08
    cache_creation: 1.00

  # ---- OpenAI — GPT ------------------------------------------------------
  # Prompt caching: cached input ≈ 0.50× input, no separate write charge
  # (first request bears full input cost, repeats are 50%).
  gpt-5:
    input: 5.00
    output: 15.00
    cache_read: 2.50          # 0.50× input
    cache_creation: 0.0       # OpenAI doesn't bill writes separately
  gpt-5-mini:
    input: 0.50
    output: 2.00
    cache_read: 0.25
    cache_creation: 0.0

  # ---- Google — Gemini ---------------------------------------------------
  # Context caching: cached input ≈ 0.25× standard. (Storage fee per hour
  # not modeled — usually a small fraction of token cost.)
  gemini-2.5-pro:
    input: 1.25
    output: 5.00
    cache_read: 0.31          # ~0.25× input
    cache_creation: 0.0
  gemini-2.5-flash:
    input: 0.10
    output: 0.40
    cache_read: 0.025
    cache_creation: 0.0

# Fallback cache pricing — applied to a model's `input` rate when the
# model entry above doesn't set explicit cache_read / cache_creation.
# These match Anthropic's ephemeral 5min cache; non-Anthropic providers
# always set their own per-model values, so this only matters when a new
# Claude model lands without us having updated the file yet.
cache:
  read_multiplier: 0.10
  creation_multiplier: 1.25

# ---------------------------------------------------------------------------
# Sandbox compute pricing — USD per second, by provider × GPU type.
#
# Today only `modal` is in use (Modal Labs, https://modal.com/pricing).
# Add new providers as a sibling map (e.g. `runpod:`, `together:`) and
# keep their GPU keys consistent so reporting stays aggregatable.
#
# Lookup chain:
#   compute.<provider>.<gpu>     ← preferred (post multi-provider)
#   compute.<gpu>                ← legacy flat fallback (deprecated)
#   compute.<provider>.cpu       ← when gpu is unset / unknown
#
# `modal` rates: best-effort approximation. Modal bills CPU + memory + GPU
# separately and updates rates over time. Memory cost is not tracked yet —
# most sandboxes use the default tier where GPU dominates.
# ---------------------------------------------------------------------------
compute:
  modal:
    cpu:        0.0000131    # ~$0.047/CPU-hr (no GPU)
    T4:         0.000164     # ~$0.59/hr
    L4:         0.000222     # ~$0.80/hr
    A10G:       0.000306     # ~$1.10/hr
    L40S:       0.000542     # ~$1.95/hr
    A100:       0.000819     # 40GB — ~$2.95/hr
    A100-80GB:  0.001270     # ~$4.57/hr
    H100:       0.001899     # ~$6.84/hr
    H200:       0.002500     # ~$9.00/hr
    B200:       0.003500     # ~$12.60/hr
